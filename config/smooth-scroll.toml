# device = "/dev/input/event9"

# DISABLED    0
# BTN_LEFT    272
# BTN_RIGHT   273
# BTN_MIDDLE  274
# BTN_SIDE    275
# BTN_EXTRA   276
free_spin_button = 273

drag_view_button = 272

drag_view_speed = 3

damping = 3.1

min_deceleration = 1420

max_deceleration = 6000

initial_speed = 600.0

speed_factor = 40.0

use_reverse_scroll_braking = true

max_reverse_scroll_braking_microseconds = 100000

max_reverse_scroll_braking_times = 3

use_mouse_movement_braking = true

# KEY_LEFTSHIFT     42
# KEY_RIGHTSHIFT    54
# KEY_LEFTCTRL      29
# KEY_RIGHTCTRL     97
# https://github.com/torvalds/linux/blob/master/include/uapi/linux/input-event-codes.h
keyboard_braking_keys = [42, 54]

# advanced

tick_interval_microseconds = 2000

speed_smooth_window_microseconds = 200000

max_speed_change_lowerbound = 512

min_speed_change_upperbound = 512

min_speed_change_ratio = 0.0625

max_speed_change_ratio = 0.5

max_mouse_movement_distance = 30

mouse_movement_window_milliseconds = 20
